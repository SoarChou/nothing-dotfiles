# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */  #
# 【用户自定义窗口规则与图层规则】
# 见 https://wiki.hyprland.org/Configuring/Window-Rules/
#
# 在此文件添加或覆盖窗口规则。
# 此文件在更新 dotfiles 时不会被修改,可放心写入。

# ===== Waybar 毛玻璃 (Nothing 风格主题用) =====
# 给 waybar 图层加背景模糊,半透明模块底下的壁纸被磨砂化 = 玻璃质感
layerrule = match:namespace waybar, blur on
# 模糊穿透半透明区域: 阈值必须低于 CSS 玻璃的 alpha(0.22),否则玻璃区域不被模糊
layerrule = match:namespace waybar, ignore_alpha 0.1

# ===== Waybar 布局编辑器: 浮动工具窗口 (Hyprland 0.53 新语法 match:) =====
windowrule = match:class waybar-layout-editor, float on, center on, size 1520 450
windowrule = match:title Waybar 布局编辑器, float on, center on, size 1520 450
# 编辑器窗口也加模糊, 玻璃感对齐 waybar
windowrule = match:class waybar-layout-editor, opacity 0.96

# swaync 通知中心/通知 毛玻璃
layerrule = match:namespace swaync-control-center, blur on
layerrule = match:namespace swaync-control-center, ignore_alpha 0.1
layerrule = match:namespace swaync-notification-window, blur on
layerrule = match:namespace swaync-notification-window, ignore_alpha 0.1
