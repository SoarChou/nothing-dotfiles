# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */  #
# 【外观装饰设置】边框、圆角、模糊、阴影、不透明度等
# 此文件在更新 dots 时不会被覆盖,可放心修改。
# 注意: 这里的部分数值可能会被「快捷设置菜单(SUPER+SHIFT+E)」等脚本动态改写。
#
# Hyprland Wiki:
# 动画 - https://wiki.hyprland.org/Configuring/Animations/
# 装饰 - https://wiki.hyprland.org/Configuring/Variables/#decoration

# 引用 wallust 根据壁纸生成的配色($color0 ~ $color15 等变量)
source = $HOME/.config/hypr/wallust/wallust-hyprland.conf

general {
  border_size = 2        # 加粗一点,边缘更有玻璃实体厚度感
  gaps_in = 5            # 窗口之间的内间距
  gaps_out = 10          # 窗口与屏幕边缘的外间距

  # 模拟玻璃边缘高光(替代 CSS inset): 顶亮白→底暗, 90° 让上缘受光下缘背光=立体厚度
  col.active_border = rgba(ffffff66) rgba(ffffff14) 90deg
  col.inactive_border = rgba(ffffff14)  # 未聚焦更淡
}

decoration {
  rounding = 16          # 窗口圆角半径(与 waybar 统一)

  active_opacity = 0.92     # 聚焦窗口轻微透明 → 配合 blur 出磨砂玻璃感
  inactive_opacity = 0.82   # 未聚焦窗口更透明
  fullscreen_opacity = 1.0   # 全屏窗口不透明(看视频/全屏应用不透)

  dim_inactive = true        # 调暗未聚焦窗口
  dim_strength = 0.1         # 调暗强度
  dim_special = 0.8          # 特殊工作区开启时背景调暗强度

  shadow {
    enabled = true           # 启用窗口阴影
    range = 14               # 阴影范围(像素,大而柔=玻璃浮起感)
    render_power = 3         # 阴影渐变强度(小=更柔和扩散)

    color = rgba(00000066)        # 中性黑柔和投影(对应 waybar 模块浮在壁纸上)
    color_inactive = rgba(00000033) # 未聚焦更淡
  }

  blur {
    enabled = true           # 启用背景模糊
    size = 12                # 模糊半径(加大=玻璃更厚重磨砂)
    passes = 4               # 模糊处理次数(4 = 更绵密的磨砂)
    new_optimizations = true # 新版模糊优化
    xray = false             # 关闭X光: 模糊壁纸而非透底层窗口, 玻璃更有"厚度"
    ignore_opacity = true    # 忽略窗口本身透明度进行模糊
    special = true           # 对特殊工作区也启用模糊
    popups = true            # 对弹出菜单启用模糊
    vibrancy = 0.4           # 色彩活力提高: 玻璃通透折射感更强
    vibrancy_darkness = 0.15 # 暗部活力
    contrast = 1.15          # 对比度略提让玻璃更立体
    brightness = 1.0         # 亮度
  }
}

group {
  col.border_active = $color15   # 窗口分组聚焦时的边框颜色

	groupbar {
		col.active = $color0   # 分组标签栏(groupbar)激活标签颜色
  }
}
