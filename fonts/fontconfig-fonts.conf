<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!--
    Fix: Nerd Font icons (Private Use Area, e.g. U+EBC6, U+F057) were being
    rendered as Chinese glyphs by Noto Sans CJK. The system's locale rules
    (69-language-selector-zh-cn.conf) prepend Noto CJK to the generic families
    with binding="strong", and Noto CJK also claims the PUA range, so it won.

    This user config is included after conf.d, so prepending a Nerd Font here
    puts it ahead of Noto CJK for PUA icon codepoints. The Nerd Font has no CJK
    glyphs, so real Chinese text still falls back to Noto CJK as before.
  -->
  <match target="pattern">
    <test qual="any" name="family"><string>sans-serif</string></test>
    <edit name="family" mode="prepend" binding="strong">
      <string>JetBrainsMono Nerd Font</string>
    </edit>
  </match>
  <match target="pattern">
    <test qual="any" name="family"><string>serif</string></test>
    <edit name="family" mode="prepend" binding="strong">
      <string>JetBrainsMono Nerd Font</string>
    </edit>
  </match>
  <match target="pattern">
    <test qual="any" name="family"><string>monospace</string></test>
    <edit name="family" mode="prepend" binding="strong">
      <string>JetBrainsMono Nerd Font Mono</string>
    </edit>
  </match>
</fontconfig>
