# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */  #
# Hyprlock config for => 2k monitor resolutions                                                         
# Original config submitted by https://github.com/SherLock707

# Sourcing colors generated by wallust
source = $HOME/.config/hypr/wallust/wallust-hyprland.conf
$Scripts = $HOME/.config/hypr/scripts

general {
    # grace = 1   # 新版 hyprlock 已移除此选项, 注释避免报错
    fractional_scaling = 2
    immediate_render = true
}

background {
    monitor =
    # NOTE: use only 1 path
	#path = screenshot   # screenshot of your desktop
	#path = $HOME/.config/hypr/wallpaper_effects/.wallpaper_modified # by wallpaper effects
    # 用预烤好的锁屏背景(已缩到屏幕尺寸+烤入模糊压暗),hyprlock 直接贴图,锁屏秒出
    # 重新生成: 见 ~/.config/hypr/wallpaper_effects/bake-lockbg.sh
    path = $HOME/.config/hypr/wallpaper_effects/.wallpaper_lock_baked.png

    color = rgb(0,0,0) # color will be rendered initially until path is available

    # 效果已烤进图里,故关闭实时模糊让锁屏秒出(原: blur_passes=3 会卡顿)
    blur_size = 6
    blur_passes = 0 # 0 disables blurring
    noise = 0.0117
    contrast = 1.1
    brightness = 0.4000   # 压暗背景 = Nothing 深色锁屏
    vibrancy = 0.1700
    vibrancy_darkness = 0.2
}


# Date
label {
    monitor =
    text = cmd[update:18000000] echo "<b> "$(date +'%A, %-d %B')" </b>"
    color = rgba(255,255,255,0.65)
    font_size = 48
    font_family = Doto Nerd Font
    position = 0, -20
    halign = center
    valign = center
}

# Hour-Time (Nothing 招牌 Doto 点阵大数字, 24h)
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgb(255,255,255)
    font_size = 173
    font_family = Doto Nerd Font
    position = 0, -133
    halign = center
    valign = top
}

