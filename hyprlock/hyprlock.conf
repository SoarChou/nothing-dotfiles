# USER
label {
    monitor =
    text =   $USER
    color = rgba(255,255,255,0.8)
    font_size = 48
    font_family = Doto Nerd Font
    position = 0, 300
    halign = center
    valign = bottom
}

# INPUT FIELD
input-field {
    monitor =
    size = 320, 60
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    outer_color = rgba(255,255,255,0.25)
    inner_color = rgba(18,18,18,0.55)
    capslock_color = rgb(215,25,33)
    check_color = rgb(215,25,33)
    fail_color = rgb(215,25,33)
    font_color = rgb(255,255,255)
    fade_on_empty = false
    font_family = Doto Nerd Font
    placeholder_text = <span foreground="##ffffff80">输入密码</span>
    hide_input = false
    rounding = 16
    position = 0, 100
    halign = center
    valign = bottom
}

# Keyboard LAYOUT
label {
    monitor =
    text = $LAYOUT
    color = rgba(255,255,255,0.55)
    font_size = 19
    font_family = Doto Nerd Font
    position = 0, 53
    halign = center
    valign = bottom
}

# uptime
label {
    monitor =
    text = cmd[update:60000] echo "<b> "$(uptime -p || $Scripts/UptimeNixOS.sh)" </b>"
    color = rgba(255,255,255,0.55)
    font_size = 32
    font_family = Doto Nerd Font
    position = 0, 0
    halign = right
    valign = bottom
}

# battery information
label {
    monitor =
    text = cmd[update:1000] echo "<b> "$($Scripts/Battery.sh)" </b>"
    color = rgba(255,255,255,0.55)
    font_size = 21
    font_family = Doto Nerd Font
    position = 0, 40
    halign = right
    valign = bottom
}

# weather edit the scripts for locations
# weather scripts are located in ~/.config/hypr/UserScripts Weather.sh and/or Weather.py
# see https://github.com/JaKooLit/Hyprland-Dots/wiki/TIPS#%EF%B8%8F-weather-app-related-for-waybar-and-hyprlock
label {
    monitor =
    text = cmd[update:3600000] [ -f "$HOME/.cache/.weather_cache" ] && cat  "$HOME/.cache/.weather_cache"
    color = rgba(255,255,255,0.55)
    font_size = 19
    font_family = Doto Nerd Font
    position = 50, 0
    halign = left
    valign = bottom
}
